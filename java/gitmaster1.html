<!DOCTYPE html>
<html lang="en">
<head>  
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="background-color:#123c89;">
    <p style="color:white;"> players welcome to the world of github </p> 
    <p style="color:white;">press the link below</p>
    </div>

    <h1 id ="number">0</h1>
    <button onclick="add()">add</button>
    <button onclick="remove()">remove</button>

<script>
    num = 0
    function add()  {
        num ++
        document.getElementById("number").textContent = num
    }
    function remove()  {
        num --
        document.getElementById("number").textContent = num
    }
</script>

</body>
</html>
